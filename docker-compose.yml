services:
  postgres:
    image: postgres:16-alpine
    container_name: centrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: centrix
      POSTGRES_PASSWORD: centrix_secret
      POSTGRES_DB: centrix
    ports:
      - "5433:5432"
    volumes:
      - centrix-postgres-data:/var/lib/postgresql/data
    networks:
      - centrix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centrix -d centrix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: centrix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - centrix-redis-data:/data
    networks:
      - centrix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: centrix-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://centrix:centrix_secret@postgres:5432/centrix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-centrix-secret-change-in-production}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_VERIFY_TOKEN: ${FACEBOOK_VERIFY_TOKEN:-centrix-verify-token}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - centrix-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: centrix-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.2.109:5001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://192.168.2.109:5001}
      API_URL: http://api:5000
    depends_on:
      - api
    networks:
      - centrix-network

volumes:
  centrix-postgres-data:
  centrix-redis-data:

networks:
  centrix-network:
    driver: bridge
